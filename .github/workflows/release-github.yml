# One-shot: bump lockstep semver, finalize CHANGELOGs, build pi binaries, create GitHub Release, push.
# Uses Bun for install/build (see packageManager). Does not publish to npm.
#
# Why everything in one workflow: pushes with GITHUB_TOKEN do not trigger other workflows, so a
# separate "tag push -> build-binaries" chain would not run for automated pushes unless you use a PAT.
#
# Manual tags pushed from your machine still trigger build-binaries.yml as before.
name: Release (GitHub binaries)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Lockstep semver bump (all packages)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-github
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Setup Node.js (for cross-platform native installs in build-binaries.sh)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump versions
        run: bun run version:${{ inputs.bump }}

      - name: Finalize changelogs
        run: node scripts/changelog-release-run.mjs finalize

      - name: Commit release and tag
        run: |
          VERSION="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('packages/ai/package.json','utf8')).version)")"
          git add -A
          git commit -m "Release v${VERSION}"
          git tag "v${VERSION}"

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Prepare release notes
        run: |
          VERSION="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('packages/ai/package.json','utf8')).version)")"
          cd packages/coding-agent
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${VERSION}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('packages/ai/package.json','utf8')).version)")"
          TAG="v${VERSION}"
          cd packages/coding-agent/binaries
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file /tmp/release-notes.md \
            pi-darwin-arm64.tar.gz \
            pi-darwin-x64.tar.gz \
            pi-linux-x64.tar.gz \
            pi-linux-arm64.tar.gz \
            pi-windows-x64.zip \
            2>/dev/null || \
          gh release upload "${TAG}" \
            pi-darwin-arm64.tar.gz \
            pi-darwin-x64.tar.gz \
            pi-linux-x64.tar.gz \
            pi-linux-arm64.tar.gz \
            pi-windows-x64.zip \
            --clobber

      - name: Add next [Unreleased] changelog sections
        run: node scripts/changelog-release-run.mjs add-unreleased

      - name: Push commits and tag
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          VERSION="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; console.log(JSON.parse(readFileSync('packages/ai/package.json','utf8')).version)")"
          git add -A
          git commit -m "Add [Unreleased] section for next cycle"
          git push origin "HEAD:${BRANCH}"
          git push origin "v${VERSION}"
